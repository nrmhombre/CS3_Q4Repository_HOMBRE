<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4th Quarter Portfolio - Nathan Raenn Hombre</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
    }

    .title {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 2.5rem;
      text-shadow: 0 0 20px rgba(0, 150, 255, 0.8);
      letter-spacing: 4px;
      z-index: 100;
      pointer-events: none;
    }

    .subtitle {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.6);
      font-size: 1rem;
      letter-spacing: 2px;
      z-index: 100;
      pointer-events: none;
    }

    .satellite-label {
      position: absolute;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      text-shadow: 0 0 10px rgba(0, 200, 255, 0.9), 0 2px 4px rgba(0, 0, 0, 0.8);
      pointer-events: none;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      z-index: 100;
    }

    .satellite-label span {
      display: block;
      font-size: 11px;
      font-weight: normal;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 4px;
    }

    .instructions {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      z-index: 100;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <h1 class="title">4th Quarter Portfolio</h1>
    <p class="subtitle">Nathan Raenn Hombre</p>
    <div class="instructions">Click on a satellite to visit the project</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Create starfield background
    const starsGeometry = new THREE.BufferGeometry();
    const starsCount = 3000;
    const starsPositions = new Float32Array(starsCount * 3);
    
    for (let i = 0; i < starsCount * 3; i += 3) {
      starsPositions[i] = (Math.random() - 0.5) * 200;
      starsPositions[i + 1] = (Math.random() - 0.5) * 200;
      starsPositions[i + 2] = (Math.random() - 0.5) * 200;
    }
    
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
    const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3 });
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    // Create Earth
    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    // Texture loader
    const textureLoader = new THREE.TextureLoader();

    // Earth sphere with textures
    const earthGeometry = new THREE.SphereGeometry(2, 64, 64);
    
    // Load Earth textures - using solar system scope textures
    const earthMaterial = new THREE.MeshPhongMaterial({
      map: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'),
      bumpMap: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg'),
      bumpScale: 0.05,
      specularMap: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg'),
      specular: new THREE.Color(0x333333),
      shininess: 25
    });
    
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    earthGroup.add(earth);

    // Add atmosphere glow
    const atmosphereGeometry = new THREE.SphereGeometry(2.1, 64, 64);
    const atmosphereMaterial = new THREE.MeshPhongMaterial({
      map: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_lights_2048.png'),
      transparent: true,
      opacity: 0.3,
      side: THREE.BackSide,
      blending: THREE.AdditiveBlending
    });
    const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
    earthGroup.add(atmosphere);

    // Add cloud layer
    const cloudGeometry = new THREE.SphereGeometry(2.06, 64, 64);
    const cloudMaterial = new THREE.MeshPhongMaterial({
      map: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png'),
      transparent: true,
      opacity: 0.35,
      side: THREE.DoubleSide
    });
    const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
    earthGroup.add(clouds);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x333333);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
    sunLight.position.set(5, 3, 5);
    scene.add(sunLight);

    const blueLight = new THREE.PointLight(0x0066ff, 0.5, 100);
    blueLight.position.set(-5, -3, -5);
    scene.add(blueLight);

    // Satellite data
    const satellites = [
      { 
        name: "1st Graded", 
        orbitRadius: 4.5, 
        orbitSpeed: 0.3, 
        orbitTilt: 0.3,
        color: 0xff6b6b,
        link: "q41gMagnesiumHOMBRE.html"
      },
      { 
        name: "2nd Graded", 
        orbitRadius: 6, 
        orbitSpeed: 0.2, 
        orbitTilt: -0.4,
        color: 0x4ecdc4,
        link: "https://example.com/second-project"
      },
      { 
        name: "Final Project", 
        orbitRadius: 7.5, 
        orbitSpeed: 0.15, 
        orbitTilt: 0.5,
        color: 0xffe66d,
        link: "https://mxaborgueta.github.io/CS3_ProjectQ3_Hombre-Borgy/"
      }
    ];

    // Create satellites
    const satelliteMeshes = [];
    const orbitLines = [];

    satellites.forEach((satData, index) => {
      // Create orbit path
      const orbitCurve = new THREE.EllipseCurve(
        0, 0,
        satData.orbitRadius, satData.orbitRadius * Math.cos(satData.orbitTilt),
        0, 2 * Math.PI,
        false,
        0
      );
      
      const orbitPoints = orbitCurve.getPoints(100);
      const orbitGeometry = new THREE.BufferGeometry().setFromPoints(orbitPoints);
      const orbitMaterial = new THREE.LineBasicMaterial({ 
        color: 0x333355, 
        transparent: true, 
        opacity: 0.3 
      });
      
      const orbit = new THREE.Line(orbitGeometry, orbitMaterial);
      orbit.rotation.x = Math.PI / 2;
      orbit.rotation.y = satData.orbitTilt;
      scene.add(orbit);
      orbitLines.push(orbit);

      // Create satellite group
      const satGroup = new THREE.Group();
      
      // Satellite body
      const satGeometry = new THREE.IcosahedronGeometry(0.4, 1);
      const satMaterial = new THREE.MeshPhongMaterial({
        color: satData.color,
        emissive: satData.color,
        emissiveIntensity: 0.3,
        shininess: 100
      });
      const satellite = new THREE.Mesh(satGeometry, satMaterial);
      satGroup.add(satellite);

      // Solar panels
      const panelGeometry = new THREE.BoxGeometry(0.8, 0.1, 0.3);
      const panelMaterial = new THREE.MeshPhongMaterial({ color: 0x2244aa });
      const panel1 = new THREE.Mesh(panelGeometry, panelMaterial);
      panel1.position.x = 0.5;
      satGroup.add(panel1);
      const panel2 = new THREE.Mesh(panelGeometry, panelMaterial);
      panel2.position.x = -0.5;
      satGroup.add(panel2);

      // Antenna
      const antennaGeometry = new THREE.CylinderGeometry(0.02, 0.02, 0.4, 8);
      const antennaMaterial = new THREE.MeshPhongMaterial({ color: 0xcccccc });
      const antenna = new THREE.Mesh(antennaGeometry, antennaMaterial);
      antenna.position.y = 0.4;
      satGroup.add(antenna);

      // Light on satellite
      const lightGeometry = new THREE.SphereGeometry(0.08, 16, 16);
      const lightMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
      const light = new THREE.Mesh(lightGeometry, lightMaterial);
      light.position.y = 0.2;
      satGroup.add(light);

      // Add point light to satellite
      const satLight = new THREE.PointLight(satData.color, 0.5, 3);
      satGroup.add(satLight);

      // Store satellite data
      satGroup.userData = {
        name: satData.name,
        link: satData.link,
        orbitRadius: satData.orbitRadius,
        orbitSpeed: satData.orbitSpeed,
        orbitTilt: satData.orbitTilt,
        angle: Math.random() * Math.PI * 2
      };

      scene.add(satGroup);
      satelliteMeshes.push(satGroup);
    });

    // Create label elements
    const labels = satellites.map((sat, index) => {
      const label = document.createElement('div');
      label.className = 'satellite-label';
      label.innerHTML = `${sat.name}<span>Click to visit</span>`;
      document.getElementById('canvas-container').appendChild(label);
      return label;
    });

    // Camera position
    camera.position.z = 18;
    camera.position.y = 5;
    camera.lookAt(0, 0, 0);

    // Mouse interaction
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };

    function onMouseMove(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      if (isDragging) {
        const deltaX = event.clientX - previousMousePosition.x;
        const deltaY = event.clientY - previousMousePosition.y;
        
        earthGroup.rotation.y += deltaX * 0.005;
        earthGroup.rotation.x += deltaY * 0.005;
        
        satelliteMeshes.forEach(sat => {
          sat.rotation.y += deltaX * 0.005;
        });
        
        previousMousePosition = { x: event.clientX, y: event.clientY };
      }
    }

    function onMouseDown(event) {
      isDragging = true;
      previousMousePosition = { x: event.clientX, y: event.clientY };
      
      // Check for click on satellite
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(satelliteMeshes, true);
      
      if (intersects.length > 0) {
        let satGroup = intersects[0].object;
        while (satGroup.parent && !satGroup.userData.link) {
          satGroup = satGroup.parent;
        }
        if (satGroup.userData.link) {
          window.open(satGroup.userData.link, '_blank');
        }
      }
    }

    function onMouseUp() {
      isDragging = false;
    }

    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mouseup', onMouseUp);

    // Touch support
    window.addEventListener('touchstart', (e) => {
      isDragging = true;
      previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    });

    window.addEventListener('touchmove', (e) => {
      if (isDragging) {
        const deltaX = e.touches[0].clientX - previousMousePosition.x;
        const deltaY = e.touches[0].clientY - previousMousePosition.y;
        
        earthGroup.rotation.y += deltaX * 0.005;
        earthGroup.rotation.x += deltaY * 0.005;
        
        previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
    });

    window.addEventListener('touchend', () => {
      isDragging = false;
    });

    // Window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      // Rotate Earth and clouds
      earth.rotation.y += 0.002;
      clouds.rotation.y += 0.0025;
      clouds.rotation.x += 0.0005;

      // Animate satellites
      satelliteMeshes.forEach((satGroup, index) => {
        const data = satGroup.userData;
        data.angle += data.orbitSpeed * 0.02;

        // Calculate position on orbit
        const x = Math.cos(data.angle) * data.orbitRadius;
        const z = Math.sin(data.angle) * data.orbitRadius;
        const y = Math.sin(data.angle) * data.orbitRadius * Math.sin(data.orbitTilt);

        satGroup.position.set(x, y, z);

        // Rotate satellite
        satGroup.rotation.y += 0.02;
        satGroup.rotation.x += 0.01;

        // Update label position
        const label = labels[index];
        const vector = new THREE.Vector3(x, y + 0.8, z);
        vector.project(camera);

        const xPos = (vector.x * 0.5 + 0.5) * window.innerWidth;
        const yPos = (-vector.y * 0.5 + 0.5) * window.innerHeight;

        label.style.left = xPos + 'px';
        label.style.top = yPos + 'px';

        // Hide label if behind Earth
        if (vector.z > 1) {
          label.style.opacity = '0';
        } else {
          label.style.opacity = '1';
        }
      });

      // Subtle camera movement
      camera.position.x = Math.sin(Date.now() * 0.0001) * 2;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
