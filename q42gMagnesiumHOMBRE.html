<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .stars {
      display: flex;
      margin-top: 10px;
      cursor: pointer;
    }

    .star {
      font-size: 30px;
      color: lightgray;
      transition: color 0.2s;
    }

    .star.active {
      color: gold;
    }

    .star.half {
      background: linear-gradient(90deg, gold 50%, lightgray 50%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border: none;
      background: #1e73ea;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }

    button:hover {
      background: #1557b0;
    }

    button.delete-btn {
      background: #dc3545;
      width: auto;
      padding: 6px 12px;
      font-size: 14px;
      margin-top: 0;
    }

    button.delete-btn:hover {
      background: #c82333;
    }

    ul {
      margin-top: 20px;
      padding-left: 0;
      list-style: none;
    }

    li {
      background: #f8f9fa;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .movie-info {
      flex: 1;
    }

    .movie-title {
      font-weight: bold;
      color: #333;
    }

    .movie-details {
      font-size: 14px;
      color: #666;
    }

    .movie-rating {
      color: gold;
      font-size: 16px;
    }

    .rating-display {
      margin-top: 5px;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 20px;
      border-radius: 5px;
      color: white;
      font-weight: bold;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    .notification.success {
      background: #28a745;
    }

    .notification.info {
      background: #17a2b8;
    }

    .notification.error {
      background: #dc3545;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .confirm-popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .confirm-popup.show {
      display: flex;
    }

    .confirm-box {
      background: white;
      padding: 25px;
      border-radius: 10px;
      text-align: center;
      max-width: 350px;
    }

    .confirm-box h3 {
      margin-bottom: 15px;
    }

    .confirm-box p {
      margin-bottom: 20px;
      color: #666;
    }

    .confirm-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .confirm-buttons button {
      width: auto;
      padding: 10px 25px;
    }

    .confirm-buttons .cancel-btn {
      background: #6c757d;
    }

    .confirm-buttons .cancel-btn:hover {
      background: #5a6268;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Add a Movie</h2>

  <label>Title:</label>
  <input type="text" id="title" placeholder="Enter movie title">

  <label>Year:</label>
  <input type="number" id="year" placeholder="Enter year">

  <label>Genre:</label>
  <select id="genre">
    <option value="">Select genre</option>
    <option>Action</option>
    <option>Comedy</option>
    <option>Drama</option>
    <option>Horror</option>
    <option>Sci-Fi</option>
    <option>Thriller</option>
  </select>

  <label>Rating:</label>
  <div class="stars" id="stars">
    <span class="star" data-value="1">★</span>
    <span class="star" data-value="2">★</span>
    <span class="star" data-value="3">★</span>
    <span class="star" data-value="4">★</span>
    <span class="star" data-value="5">★</span>
  </div>

  <button onclick="addMovie()">Add Movie</button>

  <h3>Movie List</h3>
  <ul id="movieList"></ul>
</div>

<!-- Confirmation Popup -->
<div class="confirm-popup" id="confirmPopup">
  <div class="confirm-box">
    <h3>Delete Movie</h3>
    <p id="confirmMessage">Are you sure you want to delete this movie?</p>
    <div class="confirm-buttons">
      <button class="cancel-btn" onclick="cancelDelete()">Cancel</button>
      <button onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
  let rating = 0;
  const stars = document.querySelectorAll('.star');
  let deleteIndex = -1;

  // Clear localStorage on first load to remove test data
  if (!localStorage.getItem('movieAppInitialized')) {
    localStorage.removeItem('movies');
    localStorage.setItem('movieAppInitialized', 'true');
  }

  // Star rating interaction
  stars.forEach((star, index) => {
    star.addEventListener('click', () => {
      rating = index + 1;
      updateStars();
    });
    
    star.addEventListener('mouseover', () => {
      highlightStars(index + 1);
    });
    
    star.addEventListener('mouseout', () => {
      updateStars();
    });
  });

  function highlightStars(count) {
    stars.forEach((star, i) => {
      if (i < count) {
        star.classList.add('active');
        star.classList.remove('half');
      } else {
        star.classList.remove('active', 'half');
      }
    });
  }

  function updateStars() {
    stars.forEach((star, i) => {
      star.classList.remove('active', 'half');
      if (i < rating) {
        star.classList.add('active');
      }
    });
  }

  // Show notification
  function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    notification.textContent = message;
    document.body.appendChild(notification);
    
    setTimeout(() => {
      notification.remove();
    }, 3000);
  }

  // Display rating with half stars
  function displayRating(ratingValue) {
    const fullStars = Math.floor(ratingValue);
    const hasHalf = ratingValue % 1 >= 0.5;
    let html = '';
    
    for (let i = 1; i <= 5; i++) {
      if (i <= fullStars) {
        html += '★';
      } else if (i === fullStars + 1 && hasHalf) {
        html += '★';
      } else {
        html += '☆';
      }
    }
    return html;
  }

  function addMovie() {
    const titleInput = document.getElementById('title');
    const yearInput = document.getElementById('year');
    const genreInput = document.getElementById('genre');
    
    const title = titleInput.value.trim();
    const year = yearInput.value;
    const genre = genreInput.value;

    if (!title || !year) {
      showNotification('Please fill in all required fields', 'error');
      return;
    }

    if (!genre) {
      showNotification('Please select a genre', 'error');
      return;
    }

    if (rating === 0) {
      showNotification('Please select a rating', 'error');
      return;
    }

    let movies = JSON.parse(localStorage.getItem('movies')) || [];
    
    // Check if movie with same title exists
    const existingIndex = movies.findIndex(m => m.title.toLowerCase() === title.toLowerCase());
    
    if (existingIndex !== -1) {
      // Average the ratings
      const existingMovie = movies[existingIndex];
      const currentTotalRating = existingMovie.rating * existingMovie.ratingCount;
      const newTotalRating = currentTotalRating + rating;
      const newRatingCount = existingMovie.ratingCount + 1;
      const newAverageRating = newTotalRating / newRatingCount;
      
      // Round: 0.5+ rounds up, below 0.5 rounds down
      const roundedRating = Math.round(newAverageRating * 2) / 2;
      
      movies[existingIndex].rating = roundedRating;
      movies[existingIndex].ratingCount = newRatingCount;
      movies[existingIndex].year = year;
      movies[existingIndex].genre = genre;
      
      localStorage.setItem('movies', JSON.stringify(movies));
      showNotification(`Updated "${title}" - New Rating: ${displayRating(roundedRating)}`, 'info');
    } else {
      // Add new movie
      const movie = { 
        title, 
        year, 
        genre, 
        rating, 
        ratingCount: 1 
      };
      
      movies.push(movie);
      localStorage.setItem('movies', JSON.stringify(movies));
      showNotification(`Added "${title}" with rating ${displayRating(rating)}`, 'success');
    }

    // Reset form
    titleInput.value = '';
    yearInput.value = '';
    genreInput.value = '';
    rating = 0;
    updateStars();
    
    displayMovies();
  }

  function displayMovies() {
    const list = document.getElementById('movieList');
    list.innerHTML = '';

    const movies = JSON.parse(localStorage.getItem('movies')) || [];

    if (movies.length === 0) {
      list.innerHTML = '<li style="text-align:center; color:#666;">No movies added yet</li>';
      return;
    }

    movies.forEach((movie, index) => {
      const li = document.createElement('li');
      
      const ratingDisplay = movie.ratingCount > 1 
        ? `${displayRating(movie.rating)} (${movie.ratingCount} reviews)` 
        : displayRating(movie.rating);
      
      li.innerHTML = `
        <div class="movie-info">
          <div class="movie-title">${movie.title}</div>
          <div class="movie-details">${movie.year} - ${movie.genre}</div>
          <div class="movie-rating rating-display">${ratingDisplay}</div>
        </div>
        <button class="delete-btn" onclick="showDeleteConfirm(${index}, '${movie.title.replace(/'/g, "\\'")}')">Delete</button>
      `;
      list.appendChild(li);
    });
  }

  // Delete confirmation
  function showDeleteConfirm(index, title) {
    deleteIndex = index;
    document.getElementById('confirmMessage').textContent = `Are you sure you want to delete "${title}"?`;
    document.getElementById('confirmPopup').classList.add('show');
  }

  function cancelDelete() {
    deleteIndex = -1;
    document.getElementById('confirmPopup').classList.remove('show');
  }

  function confirmDelete() {
    if (deleteIndex !== -1) {
      let movies = JSON.parse(localStorage.getItem('movies')) || [];
      const deletedTitle = movies[deleteIndex].title;
      movies.splice(deleteIndex, 1);
      localStorage.setItem('movies', JSON.stringify(movies));
      showNotification(`Deleted "${deletedTitle}"`, 'success');
      displayMovies();
    }
    cancelDelete();
  }

  // Close popup when clicking outside
  document.getElementById('confirmPopup').addEventListener('click', function(e) {
    if (e.target === this) {
      cancelDelete();
    }
  });

  // Initial display
  displayMovies();
</script>

</body>
</html>
